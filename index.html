<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <title>Othello Web (pygame-ce)</title>

  <!-- PyScript 本体 -->
  <script type="module" src="https://pyscript.net/latest/core.js"></script>

  <!-- PyScript 設定：pygame-ce を使う -->
  <script type="py-config">
    packages = ["pygame-ce"]
  </script>

  <style>
    body {
      margin: 0;
      background: #202020;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
    #game-container {
      width: 480px;
      height: 480px;
    }
    canvas {
      border: 1px solid #333;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <!-- PyScript がここに pygame の Canvas を作る -->
    <script type="py-game" src="othello.py"></script>
  </div>
</body>
</html>
