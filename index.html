<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <title>Othello Web (pygame-ce)</title>

  <!-- Pyodide -->
  <script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"></script>

  <style>
    body {
      margin: 0;
      background: #202020;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
    canvas {
      border: 1px solid #333;
    }
  </style>
</head>
<body>

  <!-- ★ 自前 Canvas -->
  <canvas id="pygame-canvas" width="480" height="480"></canvas>

  <script>
    async function main() {
      const pyodide = await loadPyodide();

      // pygame-ce をロード
      await pyodide.loadPackage("pygame-ce");

      // Python コードを読み込む
      const code = await (await fetch("othello.py")).text();

      // Canvas を pygame に渡す
      pyodide.runPython(`
import pygame
import js

canvas = js.document.getElementById("pygame-canvas")
pygame.display.set_mode((480, 480), pygame.SCALED, canvas=canvas)
`);

      // ゲーム本体を実行
      pyodide.runPython(code);
    }

    main();
  </script>

</body>
</html>
