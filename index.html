<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <title>Othello Web (pygame-wasm)</title>

  <script src="https://pygame-web.github.io/archives/0.10/pygame_wasm.js"></script>

  <style>
    body {
      margin: 0;
      background: #202020;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
    canvas {
      border: 1px solid #333;
    }
  </style>
</head>
<body>

  <canvas id="canvas" width="480" height="480"></canvas>

  <script>
    loadPygame({
      canvas: document.getElementById("canvas"),
      pythonFiles: ["othello.py"],
    });
  </script>

</body>
</html>
