<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <title>Othello Web (pygame-ce)</title>

  <script type="module" src="https://pyscript.net/latest/core.js"></script>

  <script type="py-config">
    packages = ["pygame-ce"]
  </script>

  <style>
    body {
      margin: 0;
      background: #202020;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
    canvas {
      border: 1px solid #333;
    }
  </style>
</head>
<body>

  <!-- ★ ここが重要：Canvas を自分で作る -->
  <canvas id="pygame-canvas" width="480" height="480"></canvas>

  <!-- ★ py-game に canvas の id を指定する -->
  <script type="py-game" src="othello.py" canvas="pygame-canvas"></script>

</body>
</html>
